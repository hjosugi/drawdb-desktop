name: Release (cross-platform build)

# Builds native installers for Windows, macOS (Intel + Apple Silicon) and Linux.
#
# How it works: this repo holds the *overlay* (new modules + Tauri config). The
# job clones the base drawDB-App, lays the overlay on top, generates icons,
# installs the extra dependencies, and runs tauri-action to produce bundles.
#
# NOTE: the File-menu wiring lives in three files that must be hand-merged into
# the base (see overlay/src/patches/PATCHES_FULL.md). Point `base_repo` at a fork
# that already has those patches committed to ship the full desktop UX; otherwise
# you still get building installers, just without the new File menu.
#
# Trigger: push a tag like `v1.7.0`, or run manually (workflow_dispatch).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      base_repo:
        description: "Base drawDB-App repo (owner/name)"
        default: "khsuzan/drawDB-App"
      base_ref:
        description: "Base repo branch or tag"
        default: "main"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-latest,  rust_target: aarch64-apple-darwin, args: "--target aarch64-apple-darwin" }
          - { os: macos-latest,  rust_target: x86_64-apple-darwin,  args: "--target x86_64-apple-darwin" }
          - { os: ubuntu-22.04,  rust_target: "",                   args: "" }
          - { os: windows-latest, rust_target: "",                  args: "" }

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout overlay
        uses: actions/checkout@v4
        with:
          path: overlay-src

      - name: Resolve base repo
        shell: bash
        run: |
          echo "BASE_REPO=${{ github.event.inputs.base_repo || 'khsuzan/drawDB-App' }}" >> "$GITHUB_ENV"
          echo "BASE_REF=${{ github.event.inputs.base_ref || 'main' }}" >> "$GITHUB_ENV"

      - name: Checkout base drawDB-App
        uses: actions/checkout@v4
        with:
          repository: ${{ env.BASE_REPO }}
          ref: ${{ env.BASE_REF }}
          path: app

      - name: Apply overlay onto base
        shell: bash
        run: |
          cp -R overlay-src/overlay/. app/
          echo "Overlay applied. Reminder: PATCHES_FULL.md edits are manual."

      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev \
            patchelf build-essential libssl-dev file

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./app/src-tauri -> target"

      - name: Setup Python (icon generation)
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate icons
        run: |
          python -m pip install --quiet pillow
          python overlay-src/scripts/generate_icons.py -o app/src-tauri/icons

      - name: Install frontend dependencies
        working-directory: app
        run: |
          npm install --no-audit --no-fund
          npm install --no-audit --no-fund jszip exceljs @tauri-apps/api \
            @tauri-apps/plugin-fs @tauri-apps/plugin-dialog \
            @tauri-apps/plugin-single-instance @tauri-apps/plugin-sql

      - name: Build app and (on tag) publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: app
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: "drawDB Desktop ${{ github.ref_name }}"
          releaseDraft: true
          releaseBody: "Automated cross-platform build. See HANDOVER.md."
          args: ${{ matrix.args }}

      - name: Upload bundles as workflow artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: drawdb-${{ matrix.os }}-${{ matrix.rust_target || 'native' }}
          path: |
            app/src-tauri/target/**/release/bundle/**/*.dmg
            app/src-tauri/target/**/release/bundle/**/*.app
            app/src-tauri/target/**/release/bundle/**/*.AppImage
            app/src-tauri/target/**/release/bundle/**/*.deb
            app/src-tauri/target/**/release/bundle/**/*.rpm
            app/src-tauri/target/**/release/bundle/**/*.exe
            app/src-tauri/target/**/release/bundle/**/*.msi
          if-no-files-found: ignore
          retention-days: 14
