name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    name: Lint configs + smoke tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dev dependencies (exceljs)
        run: npm install --no-audit --no-fund

      - name: Validate Tauri JSON configs
        run: npm run test:config

      - name: SQL dialect smoke tests (Oracle / MySQL / PostgreSQL)
        run: npm run test:sql

      - name: Excel I/O smoke test (exceljs round-trip)
        run: npm run test:excel

  icons:
    name: Icon generator runs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Generate default icon set
        run: |
          python -m pip install --quiet pillow
          python scripts/generate_icons.py -o /tmp/icons
          ls -la /tmp/icons
